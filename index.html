<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lutinha</title>
</head>
<body>
    <center>
        <h1 class="titulo_principal">Jogo de Combate</h1>
        <br>
        <h2>No jogo existem 3 classes de heróis: Guerreiro, Mago e Arqueiro. Escolha a classe que você quer.</h2>
        <br>
        
        <label for="herois">Escolha um herói:</label>
        <select id="herois" name="herois">
            <option value="Guerreiro">Guerreiro</option>
            <option value="Mago">Mago</option>
            <option value="Arqueiro">Arqueiro</option>
        </select>
        <br><br>
        
        <h3>Escolha sua arma:</h3>
        
        <input type="radio" id="espada" name="arma" value="espada">
        <label for="espada">Espada</label>
        <br>
        
        <input type="radio" id="cajado" name="arma" value="cajado">
        <label for="cajado">Cajado</label>
        <br>
        
        <input type="radio" id="arco" name="arma" value="arco">
        <label for="arco">Arco</label>
    </center>
    

    
</body>
</html>
